<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星穹枢纽 - 核心团队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0c1b2d 50%, #121212 100%);
            color: #e0f7ff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 科技感背景元素 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(10, 150, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 150, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
        
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.6), transparent);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            animation: scan 3s linear infinite;
            z-index: -1;
        }
        
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* 主容器 - “中间站” */
        .station-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部导航/标识 */
        .station-header {
            text-align: center;
            margin-bottom: 60px;
            padding: 20px;
            border-bottom: 1px solid rgba(64, 224, 208, 0.3);
        }
        
        .team-title {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00e5ff, #00ffaa, #00e5ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        @keyframes shine {
            to { background-position: 200% center; }
        }
        
        .team-subtitle {
            font-size: 1.2rem;
            color: #a0e7ff;
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* 核心内容区域 */
        .core-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        
        .hologram-display {
            width: 80%;
            max-width: 800px;
            height: 400px;
            background: rgba(20, 30, 48, 0.7);
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 30px rgba(0, 150, 255, 0.3),
                inset 0 0 40px rgba(0, 200, 255, 0.1);
            margin-bottom: 60px;
        }
        
        /* 全息投影效果 */
        .hologram-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 255, 255, 0.1),
                transparent 30%
            );
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        .hologram-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            padding: 40px;
        }
        
        .team-motto {
            font-size: 1.8rem;
            text-align: center;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
        }
        
        .team-motto .highlight {
            color: #00ffaa;
            font-weight: bold;
        }

        /* 底部按钮区域 */
        .action-terminal {
            text-align: center;
            padding: 40px 0;
        }
        
        .terminal-label {
            font-size: 1.1rem;
            color: #80e1ff;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        /* 渐变椭圆按钮 */
        .nexus-button {
            display: inline-block;
            padding: 22px 60px;
            border-radius: 50px; /* 椭圆形 */
            font-size: 1.4rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
            color: #0a192f;
            transition: all 0.3s ease;
            
            /* 持续渐变动画背景 */
            background: linear-gradient(
                90deg,
                #ff0080,
                #ff8c00,
                #40e0d0,
                #20b2aa,
                #9370db,
                #ff0080
            );
            background-size: 400% 100%;
            animation: gradientShift 8s ease infinite;
            
            box-shadow: 
                0 0 25px rgba(64, 224, 208, 0.5),
                0 0 50px rgba(64, 224, 208, 0.2),
                inset 0 0 15px rgba(255, 255, 255, 0.3);
        }
        
        /* 背景渐变动画 */
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 按钮悬浮效果 */
        .nexus-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 0 35px rgba(64, 224, 208, 0.7),
                0 0 70px rgba(64, 224, 208, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.4);
            animation-duration: 4s; /* 悬浮时加快动画速度 */
        }
        
        .nexus-button:active {
            transform: translateY(1px) scale(0.98);
        }
        
        /* 按钮发光边框效果 */
        .nexus-button::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 52px;
            background: linear-gradient(
                90deg,
                #ff0080,
                #ff8c00,
                #40e0d0,
                #20b2aa,
                #9370db,
                #ff0080
            );
            background-size: 400% 100%;
            animation: gradientShift 8s ease infinite;
            z-index: -1;
            opacity: 0.7;
            filter: blur(8px);
        }
        
        /* 底部信息 */
        .station-footer {
            text-align: center;
            padding: 30px 0 20px;
            color: #6688aa;
            font-size: 0.9rem;
            border-top: 1px solid rgba(64, 224, 208, 0.2);
        }
        
        .footer-text {
            opacity: 0.7;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .team-title {
                font-size: 2.5rem;
            }
            
            .team-subtitle {
                font-size: 1rem;
                letter-spacing: 2px;
            }
            
            .hologram-display {
                width: 95%;
                height: 300px;
            }
            
            .team-motto {
                font-size: 1.4rem;
            }
            
            .nexus-button {
                padding: 18px 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 科技感背景元素 -->
    <div class="bg-grid"></div>
    <div class="scan-line"></div>
    
    <!-- 主中间站容器 -->
    <div class="station-container">
        <!-- 顶部标题区域 -->
        <header class="station-header">
            <h1 class="team-title">NEXUS STATION</h1>
            <p class="team-subtitle">星穹枢纽 · 核心团队</p>
        </header>
        
        <!-- 核心内容区域 -->
        <main class="core-content">
            <div class="hologram-display">
                <div class="hologram-content">
                    <div class="team-motto">
                        "于数据洪流中构筑桥梁，<br>
                        在信息深空里点燃星火。<br>
                        我们是<span class="highlight">秩序</span>的编织者，<br>
                        <span class="highlight">创新</span>的导航仪，<br>
                        欢迎来到未来交汇之地。"
                    </div>
                </div>
            </div>
            
            <!-- 底部按钮终端 -->
            <div class="action-terminal">
                <div class="terminal-label">>> 终端就绪，等待指令接入 <<</div>
                <a href="http://m.webcats.cn/bx/135919/70182" class="nexus-button" id="nexusButton">
                    接入核心枢纽
                </a>
            </div>
        </main>
        
        <!-- 底部信息 -->
        <footer class="station-footer">
            <p class="footer-text">NEXUS STATION v2.6.0 | 量子加密信道已建立 | 系统状态: <span style="color:#00ffaa;">● 在线</span></p>
        </footer>
    </div>
    
    <script>
        // 为按钮添加点击反馈效果
        document.getElementById('nexusButton').addEventListener('click', function(e) {
            // 添加点击视觉效果
            const button = e.currentTarget;
            const originalText = button.textContent;
            
            // 短暂改变文本表示跳转中
            button.textContent = '信道建立中...';
            button.style.animation = 'none'; // 暂停动画
            
            // 0.8秒后恢复文本（实际跳转会发生）
            setTimeout(() => {
                button.textContent = originalText;
                button.style.animation = 'gradientShift 8s ease infinite';
            }, 800);
            
            // 允许默认的链接跳转行为
            // 页面将跳转到指定网址
        });
        
        // 添加动态背景粒子效果（可选增强）
        window.addEventListener('DOMContentLoaded', function() {
            // 创建粒子背景
            const particleContainer = document.createElement('div');
            particleContainer.style.position = 'fixed';
            particleContainer.style.top = '0';
            particleContainer.style.left = '0';
            particleContainer.style.width = '100%';
            particleContainer.style.height = '100%';
            particleContainer.style.pointerEvents = 'none';
            particleContainer.style.zIndex = '-1';
            document.body.appendChild(particleContainer);
            
            // 生成粒子
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 3 + 1 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = 'rgba(100, 200, 255, 0.6)';
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.boxShadow = '0 0 8px rgba(100, 200, 255, 0.8)';
                particleContainer.appendChild(particle);
                
                // 为粒子添加浮动动画
                animateParticle(particle);
            }
            
            function animateParticle(element) {
                const startX = Math.random() * 100;
                const startY = Math.random() * 100;
                const amplitudeX = Math.random() * 10 + 5;
                const amplitudeY = Math.random() * 10 + 5;
                const period = Math.random() * 20000 + 15000;
                let time = 0;
                
                function move() {
                    time += 50;
                    const x = startX + amplitudeX * Math.sin(time * 2 * Math.PI / period);
                    const y = startY + amplitudeY * Math.cos(time * 2 * Math.PI / (period * 0.7));
                    
                    element.style.left = x + '%';
                    element.style.top = y + '%';
                    
                    requestAnimationFrame(move);
                }
                
                move();
            }
        });
    </script>
</body>
</html>
